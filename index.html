<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Name Picker">
<meta name="theme-color" content="#fdf6f0">
<title>Baby Name Picker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg1:#fdf6f0;--bg2:#fce8e4;--bg3:#f0dde8;--bg4:#e8daf0;
  --ink:#4a2c3d;--ink2:#5a3a4a;--sub:#9a7b8a;--sub2:#8a6a7a;--sub3:#b09aaa;
  --accent:#d4a0a0;--accent2:#a080c0;--heart:#d4506a;--heartOff:#c0a8b0;
  --cardL:#fce8ea;--cardR:#e8e4fc;
  --white60:rgba(255,255,255,0.55);--white40:rgba(255,255,255,0.4);
  --ff:"DM Sans",sans-serif;--fd:"Playfair Display",Georgia,serif;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{font-family:var(--ff);color:var(--ink);background:linear-gradient(170deg,var(--bg1) 0%,var(--bg2) 35%,var(--bg3) 70%,var(--bg4) 100%);min-height:100vh;min-height:100dvh;padding:calc(20px + var(--safe-top)) 16px calc(32px + var(--safe-bot));display:flex;flex-direction:column;align-items:center}
button{font-family:var(--ff);cursor:pointer;border:none;background:none;-webkit-appearance:none}
.hdr{text-align:center;margin-bottom:4px}
.hdr h1{font-family:var(--fd);font-size:28px;font-weight:700;letter-spacing:-.5px;color:var(--ink)}
.hdr p{font-size:11px;color:var(--sub);margin-top:4px;font-weight:500}
/* Gender filter */
.gender-bar{display:flex;gap:3px;background:rgba(255,255,255,.45);border-radius:10px;padding:3px;margin:8px 0 4px}
.gender-bar button{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;color:var(--sub2);transition:all .2s}
.gender-bar button.on{background:#fff;color:var(--ink);box-shadow:0 1px 6px rgba(100,50,80,.08)}
.nav{display:flex;gap:3px;background:rgba(255,255,255,.5);border-radius:11px;padding:3px;margin:4px 0 16px}
.nav button{padding:8px 14px;border-radius:9px;font-size:13px;font-weight:600;color:var(--sub2);transition:all .2s}
.nav button.on{background:#fff;color:var(--ink);box-shadow:0 2px 8px rgba(100,50,80,.1)}
.pick-wrap{width:100%;max-width:400px;display:flex;flex-direction:column;align-items:center;flex:1}
.prompt{font-family:var(--fd);font-size:18px;color:var(--ink2);margin-bottom:18px;font-weight:600;text-align:center}
.vs{display:flex;gap:12px;width:100%;margin-bottom:10px}
.card-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.card{width:100%;min-height:120px;border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 10px;gap:5px;box-shadow:0 4px 18px rgba(100,50,80,.1);transition:all .25s cubic-bezier(.34,1.56,.64,1)}
.card.left{background:linear-gradient(135deg,#fff 0%,var(--cardL) 100%)}
.card.right{background:linear-gradient(135deg,#fff 0%,var(--cardR) 100%)}
.card.win{transform:scale(1.05);box-shadow:0 8px 28px rgba(100,50,80,.18)}
.card.lose{transform:scale(.92);opacity:.35}
.card-name{font-family:var(--fd);font-size:22px;font-weight:700;color:var(--ink);text-align:center}
.card-var{font-size:10px;color:var(--sub3);font-weight:500}
.card-actions{display:flex;gap:6px}
.heart-btn{background:rgba(255,255,255,.6);width:32px;height:32px;border-radius:50%;font-size:17px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(100,50,80,.06);transition:transform .15s;color:var(--heartOff)}
.heart-btn.on{color:var(--heart)}
.elim-btn{background:rgba(255,255,255,.6);width:32px;height:32px;border-radius:50%;font-size:14px;display:flex;align-items:center;justify-content:center;font-weight:700;box-shadow:0 1px 4px rgba(100,50,80,.06);transition:transform .15s;color:#c0a0a0}
.neither-btn{border:1px solid rgba(180,100,100,.2);background:var(--white40);color:#a07070;padding:10px 24px;border-radius:11px;font-size:13px;font-weight:600;margin-bottom:20px;transition:all .2s}
.neither-btn.pop{background:rgba(200,100,100,.12);transform:scale(.96)}
.prog-bg{width:100%;height:5px;background:rgba(255,255,255,.5);border-radius:3px;overflow:hidden}
.prog-fg{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .4s}
.prog-txt{font-size:11px;color:var(--sub);font-weight:500;margin-top:5px}
.list-wrap{width:100%;max-width:420px;flex:1}
.list-hdr{font-size:13px;color:var(--sub2);margin-bottom:10px;font-weight:500}
.row{background:var(--white60);border-radius:13px;padding:10px 12px;margin-bottom:5px;display:flex;flex-direction:column;gap:4px}
.row-top{display:flex;align-items:center;gap:7px}
.row-rank{font-size:12px;font-weight:700;color:var(--sub3);width:20px;text-align:right;flex-shrink:0}
.row-rank.g{color:#c5952e}.row-rank.s{color:#8a8a8e}.row-rank.b{color:#a06a40}
.row-name{font-family:var(--fd);font-size:16px;font-weight:600;color:var(--ink)}
.row-gender{font-size:10px;padding:1px 6px;border-radius:6px;font-weight:600}
.row-gender.f{background:rgba(212,80,106,.1);color:#c06080}
.row-gender.m{background:rgba(80,120,200,.1);color:#5080c0}
.row-heart{font-size:16px;padding:2px 3px;color:var(--heartOff)}
.row-heart.on{color:var(--heart)}
.row-x{font-size:13px;padding:2px 5px;color:#c0a0a0;font-weight:700}
.bar-bg{height:4px;background:rgba(180,140,170,.12);border-radius:2px;overflow:hidden}
.bar-fg{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .3s}
.row-bot{display:flex;align-items:center;justify-content:space-between}
.row-score{font-size:10px;color:var(--sub3);font-weight:600}
.spell-link{font-size:10px;color:#8a6aaa;font-weight:600;padding:0}
.back-btn{color:var(--sub2);font-size:14px;font-weight:600;padding:4px 0;margin-bottom:10px}
.spell-title{font-family:var(--fd);font-size:22px;font-weight:700;color:var(--ink);margin-bottom:4px}
.spell-sub{font-size:13px;color:var(--sub);margin-bottom:14px}
.spell-opt{border:1px solid rgba(160,128,192,.2);background:rgba(255,255,255,.6);border-radius:13px;padding:14px 18px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 6px rgba(100,50,80,.05);transition:all .2s;width:100%;text-align:left}
.spell-opt.chosen{background:rgba(160,100,180,.1);border-color:rgba(140,90,170,.35)}
.spell-opt span:first-child{font-family:var(--fd);font-size:19px;font-weight:600;color:var(--ink)}
.spell-check{font-size:18px;color:#8a6aaa;font-weight:700}
.empty{text-align:center;padding:36px 20px}
.empty-icon{font-size:40px;margin-bottom:8px}
.empty-txt{font-size:14px;color:var(--sub2);line-height:1.5;margin-bottom:16px}
.cta{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:11px 28px;border-radius:11px;font-size:14px;font-weight:600}
.more-btn{border:1px solid rgba(160,128,192,.25);background:rgba(255,255,255,.45);color:#7a5a8a;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;margin-top:8px;width:100%}
.footer{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:420px;margin-top:18px;padding-top:12px;border-top:1px solid rgba(160,128,170,.15)}
.foot-note{font-size:10px;color:var(--sub3)}
.reset-btn{color:#c08a8a;font-size:12px;font-weight:600;padding:4px 8px}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="hdr">
  <h1>Baby Name Picker</h1>
  <p id="statsLine">Loading...</p>
</div>
<div class="gender-bar" id="genderBar">
  <button class="on" data-g="girl">Girl Names</button>
  <button data-g="boy">Boy Names</button>
  <button data-g="both">Both</button>
</div>
<div class="nav" id="nav">
  <button class="on" data-v="pick">Compare</button>
  <button data-v="ranks">Rankings</button>
  <button data-v="favs" id="favTab">Favs (0)</button>
</div>
<div class="pick-wrap" id="viewPick">
  <p class="prompt">Which name do you prefer?</p>
  <div class="vs">
    <div class="card-col">
      <button class="card left" id="cardL"><span class="card-name" id="nameL"></span><span class="card-var" id="varL"></span></button>
      <div class="card-actions"><button class="heart-btn" id="heartL">♡</button><button class="elim-btn" id="elimL">✕</button></div>
    </div>
    <div class="card-col">
      <button class="card right" id="cardR"><span class="card-name" id="nameR"></span><span class="card-var" id="varR"></span></button>
      <div class="card-actions"><button class="heart-btn" id="heartR">♡</button><button class="elim-btn" id="elimR">✕</button></div>
    </div>
  </div>
  <button class="neither-btn" id="neitherBtn">Neither — eliminate both</button>
  <div style="width:100%;display:flex;flex-direction:column;align-items:center">
    <div class="prog-bg"><div class="prog-fg" id="progBar" style="width:0%"></div></div>
    <span class="prog-txt" id="progTxt">Keep going...</span>
  </div>
</div>
<div class="pick-wrap hidden" id="pickEmpty"><div class="empty"><p class="empty-icon">🎉</p><p class="empty-txt">No more names to compare!<br>Check Rankings or Favs.</p></div></div>
<div class="list-wrap hidden" id="viewRanks"></div>
<div class="list-wrap hidden" id="viewFavs"></div>
<div class="list-wrap hidden" id="viewSpell"></div>
<div class="footer">
  <span class="foot-note" id="footNote"></span>
  <button class="reset-btn" id="resetBtn">Reset All</button>
</div>

// ── Phonetic key ──
function pk(n){let s=n.toLowerCase().trim();s=s.replace(/leigh$/,'lee');s=s.replace(/leah$/,'lee');s=s.replace(/ley$/,'lee');s=s.replace(/lie$/,'lee');s=s.replace(/lee$/,'lee');s=s.replace(/ly$/,'lee');s=s.replace(/lyn+e?$/,'lin');s=s.replace(/line$/,'lin');s=s.replace(/ynn$/,'in');s=s.replace(/anne$/,'an');s=s.replace(/ann$/,'an');s=s.replace(/elle$/,'el');s=s.replace(/^kh/,'k');s=s.replace(/^mck/,'mak');s=s.replace(/^mc/,'mak');s=s.replace(/ph/g,'f');s=s.replace(/ght/g,'t');s=s.replace(/ck/g,'k');s=s.replace(/aa/g,'a');s=s.replace(/ee/g,'e');s=s.replace(/oo/g,'u');s=s.replace(/c([eiy])/g,'s$1');s=s.replace(/eigh/g,'a');s=s.replace(/igh/g,'i');s=s.replace(/ai/g,'a');s=s.replace(/ay/g,'a');s=s.replace(/ae/g,'a');s=s.replace(/ei/g,'e');s=s.replace(/ey/g,'e');s=s.replace(/ie/g,'e');s=s.replace(/([^sct])h/g,'$1');s=s.replace(/^h/,'');s=s.replace(/y/g,'i');s=s.replace(/(.)\1+/g,'$1');s=s.replace(/x/g,'ks');s=s.replace(/qu/g,'kw');return s;}

function buildGroups(raw){const m={};[...new Set(raw)].forEach(n=>{const k=pk(n);if(!m[k])m[k]=[];if(!m[k].includes(n))m[k].push(n);});const g={};Object.values(m).forEach(vs=>{const c=vs.sort((a,b)=>a.length-b.length)[0];g[c]=[...vs].sort();});return g;}

const G_GIRLS=buildGroups(GIRL_RAW), G_BOYS=buildGroups(BOY_RAW);
const ALL_GIRLS=Object.keys(G_GIRLS), ALL_BOYS=Object.keys(G_BOYS);

// Gender meta: track which names are girl/boy
const GENDER={};
ALL_GIRLS.forEach(n=>{GENDER[n]='f';});
ALL_BOYS.forEach(n=>{if(GENDER[n])GENDER[n]='b';else GENDER[n]='m';}); // b=both

// Merge groups
const GROUPS={...G_GIRLS};
Object.entries(G_BOYS).forEach(([k,v])=>{
  if(GROUPS[k]){GROUPS[k]=[...new Set([...GROUPS[k],...v])].sort();}
  else GROUPS[k]=v;
});

function namesForFilter(f){
  if(f==='girl')return ALL_GIRLS;
  if(f==='boy')return ALL_BOYS;
  return [...new Set([...ALL_GIRLS,...ALL_BOYS])];
}

// ── ELO ──
function elo(a,b,w){const K=32,ra=S.ratings[a]||1000,rb=S.ratings[b]||1000,ea=1/(1+Math.pow(10,(rb-ra)/400)),eb=1/(1+Math.pow(10,(ra-rb)/400));if(!w){S.ratings[a]=ra-16;S.ratings[b]=rb-16;return;}S.ratings[a]=ra+K*((w===a?1:0)-ea);S.ratings[b]=rb+K*((w===b?1:0)-eb);}

// ── Pairing ──
function pickPair(pool,favs){
  if(pool.length<2)return null;
  const cnt={};pool.forEach(n=>cnt[n]=0);
  S.comps.forEach(([a,b])=>{if(a in cnt)cnt[a]++;if(b in cnt)cnt[b]++;});
  const fa=pool.filter(n=>favs[n]);
  const t20=[...pool].sort((a,b)=>(S.ratings[b]||1000)-(S.ratings[a]||1000)).slice(0,20);
  const ls=[...pool].sort((a,b)=>cnt[a]-cnt[b]).slice(0,Math.max(20,pool.length*.15));
  const el=[...new Set([...fa,...t20])];
  const r=Math.random();let pA,pB;
  if(r<.4&&el.length>=2){pA=el;pB=el;}
  else if(r<.7&&el.length>=1){pA=el;pB=ls;}
  else{pA=ls;pB=pool;}
  let a=pA[Math.floor(Math.random()*pA.length)],b,t=0;
  do{b=pB[Math.floor(Math.random()*pB.length)];t++;}while(b===a&&t<80);
  return a!==b?[a,b]:null;
}

// ── State ──
const SKEY='babynames-v6';
let S={ratings:{},comps:[],elim:{},favs:{},spellings:{},filter:'girl'};
let pair=null,curView='pick';

function load(){try{const d=JSON.parse(localStorage.getItem(SKEY));if(d){S=d;if(!S.spellings)S.spellings={};if(!S.filter)S.filter='girl';}}catch{}}
function save(){try{localStorage.setItem(SKEY,JSON.stringify(S));}catch{}}
function pool(){return namesForFilter(S.filter).filter(n=>!S.elim[n]);}
function dn(c){return S.spellings[c]||c;}
function genderLabel(n){const g=GENDER[n];return g==='f'?'♀':g==='m'?'♂':g==='b'?'⚥':'';}
function genderClass(n){const g=GENDER[n];return g==='f'?'f':g==='m'?'m':'f';}

// ── DOM ──
const $=id=>document.getElementById(id);
const statsLine=$('statsLine'),favTab=$('favTab'),footNote=$('footNote');
const cardL=$('cardL'),cardR=$('cardR'),nameL=$('nameL'),nameR=$('nameR'),varL=$('varL'),varR=$('varR');
const heartL=$('heartL'),heartR=$('heartR'),elimL=$('elimL'),elimR=$('elimR'),neitherBtn=$('neitherBtn');
const progBar=$('progBar'),progTxt=$('progTxt');
const viewPick=$('viewPick'),pickEmpty=$('pickEmpty');
const viewRanks=$('viewRanks'),viewFavs=$('viewFavs'),viewSpell=$('viewSpell');
const views={pick:viewPick,ranks:viewRanks,favs:viewFavs,spell:viewSpell};

function updateStats(){
  const p=pool();
  statsLine.textContent=`${p.length} remaining · ${S.comps.length} compared · ${Object.keys(S.elim).length} eliminated`;
  favTab.textContent=`Favs (${Object.keys(S.favs).length})`;
  const all=namesForFilter(S.filter);
  footNote.textContent=`${all.length} ${S.filter==='both'?'total':S.filter} names`;
  progBar.style.width=Math.min(100,S.comps.length/2)+'%';
  const c=S.comps.length;
  progTxt.textContent=c<30?'Keep going...':c<100?'Getting interesting!':c<250?'Rankings shaping up!':'Great data!';
}

function renderPair(){
  if(!pair){viewPick.classList.add('hidden');pickEmpty.classList.remove('hidden');return;}
  viewPick.classList.remove('hidden');pickEmpty.classList.add('hidden');
  nameL.textContent=dn(pair[0]);nameR.textContent=dn(pair[1]);
  const vl=GROUPS[pair[0]]||[],vr=GROUPS[pair[1]]||[];
  varL.textContent=vl.length>1?`+${vl.length-1} spelling${vl.length>2?'s':''}`:'';
  varR.textContent=vr.length>1?`+${vr.length-1} spelling${vr.length>2?'s':''}`:'';
  heartL.textContent=S.favs[pair[0]]?'♥':'♡';heartL.className='heart-btn'+(S.favs[pair[0]]?' on':'');
  heartR.textContent=S.favs[pair[1]]?'♥':'♡';heartR.className='heart-btn'+(S.favs[pair[1]]?' on':'');
  cardL.className='card left';cardR.className='card right';
}

let animLock=false;

function doPick(side){
  if(!pair||animLock)return;animLock=true;
  const w=pair[side==='left'?0:1],l=pair[side==='left'?1:0];
  cardL.classList.add(side==='left'?'win':'lose');cardR.classList.add(side==='right'?'win':'lose');
  setTimeout(()=>{elo(w,l,w);S.comps.push([pair[0],pair[1],w]);save();pair=pickPair(pool(),S.favs);renderPair();updateStats();animLock=false;},250);
}

function doNeither(){
  if(!pair||animLock)return;animLock=true;
  cardL.classList.add('lose');cardR.classList.add('lose');
  setTimeout(()=>{elo(pair[0],pair[1],null);S.comps.push([pair[0],pair[1],null]);S.elim[pair[0]]=1;S.elim[pair[1]]=1;delete S.favs[pair[0]];delete S.favs[pair[1]];save();pair=pickPair(pool(),S.favs);renderPair();updateStats();animLock=false;},250);
}

function elimOne(side){
  if(!pair||animLock)return;animLock=true;
  const idx=side==='left'?0:1,card=side==='left'?cardL:cardR;
  const gone=pair[idx],keep=pair[1-idx];
  card.classList.add('lose');
  setTimeout(()=>{
    S.elim[gone]=1;delete S.favs[gone];S.ratings[gone]=(S.ratings[gone]||1000)-16;save();
    const p=pool().filter(n=>n!==keep);
    if(p.length===0)pair=null;
    else{const rep=p[Math.floor(Math.random()*p.length)];pair=side==='left'?[rep,keep]:[keep,rep];}
    renderPair();updateStats();animLock=false;
  },250);
}

function toggleFav(name){if(S.favs[name])delete S.favs[name];else S.favs[name]=1;save();updateStats();if(curView==='pick')renderPair();if(curView==='ranks')renderRanks();if(curView==='favs')renderFavsList();}
function eliminate(name){S.elim[name]=1;delete S.favs[name];save();updateStats();if(pair&&(pair[0]===name||pair[1]===name)){pair=pickPair(pool(),S.favs);renderPair();}if(curView==='ranks')renderRanks();if(curView==='favs')renderFavsList();}

function rowHTML(name,score,rank,isFav,max,min){
  const range=max-min||1,pct=((score-min)/range)*100;
  const rc=rank===1?' g':rank===2?' s':rank===3?' b':'';
  const vs=GROUPS[name]||[name],hasS=vs.length>1;
  const cs=S.spellings[name];
  const sl=cs?`✓ ${cs}`:`${vs.length} spellings →`;
  const gl=genderLabel(name),gc=genderClass(name);
  return `<div class="row"><div class="row-top"><span class="row-rank${rc}">${rank}</span><span class="row-name">${dn(name)}</span>${S.filter==='both'?`<span class="row-gender ${gc}">${gl}</span>`:''}<div style="flex:1"></div><button class="row-heart${isFav?' on':''}" onclick="toggleFav('${name}')">${isFav?'♥':'♡'}</button><button class="row-x" onclick="eliminate('${name}')">✕</button></div><div class="bar-bg"><div class="bar-fg" style="width:${Math.max(6,pct)}%"></div></div><div class="row-bot"><span class="row-score">${Math.round(score)} ELO</span>${hasS?`<button class="spell-link" onclick="openSpell('${name}')">${sl}</button>`:''}</div></div>`;
}

let rankShowN=25;
function renderRanks(){
  const p=pool();
  const ranked=Object.entries(S.ratings).filter(([n])=>!S.elim[n]&&p.includes(n)).sort((a,b)=>b[1]-a[1]);
  if(ranked.length===0){viewRanks.innerHTML=`<div class="empty"><p class="empty-icon">💭</p><p class="empty-txt">Start comparing to build rankings!</p><button class="cta" onclick="switchView('pick')">Start</button></div>`;return;}
  const shown=ranked.slice(0,rankShowN),max=shown[0][1],min=shown[shown.length-1][1];
  let h=`<p class="list-hdr">Top names from ${S.comps.length} comparisons:</p>`;
  shown.forEach(([n,s],i)=>{h+=rowHTML(n,s,i+1,!!S.favs[n],max,min);});
  if(ranked.length>rankShowN)h+=`<button class="more-btn" onclick="rankShowN+=25;renderRanks()">Show more</button>`;
  viewRanks.innerHTML=h;
}

function renderFavsList(){
  const p=pool();
  const fl=Object.keys(S.favs).filter(n=>!S.elim[n]&&p.includes(n)).sort((a,b)=>(S.ratings[b]||1000)-(S.ratings[a]||1000));
  if(fl.length===0){viewFavs.innerHTML=`<div class="empty"><p class="empty-icon">♡</p><p class="empty-txt">No favorites yet! Tap the heart while comparing.</p><button class="cta" onclick="switchView('pick')">Start</button></div>`;return;}
  const max=S.ratings[fl[0]]||1000,min=S.ratings[fl[fl.length-1]]||1000;
  let h=`<p class="list-hdr">Your ${fl.length} favorite${fl.length>1?'s':''}:</p>`;
  fl.forEach((n,i)=>{h+=rowHTML(n,S.ratings[n]||1000,i+1,true,max,min);});
  viewFavs.innerHTML=h;
}

function openSpell(name){
  switchView('spell');
  const vs=GROUPS[name]||[name];
  let h=`<button class="back-btn" onclick="switchView('favs')">← Back</button><h2 class="spell-title">Choose your spelling</h2><p class="spell-sub">All versions of "${name}"</p>`;
  vs.forEach(v=>{const ch=S.spellings[name]===v;h+=`<button class="spell-opt${ch?' chosen':''}" onclick="pickSpelling('${name}','${v}')"><span>${v}</span>${ch?'<span class="spell-check">✓</span>':''}</button>`;});
  viewSpell.innerHTML=h;
}
window.openSpell=openSpell;
function pickSpelling(c,s){S.spellings[c]=s;save();openSpell(c);}
window.pickSpelling=pickSpelling;

function switchView(v){
  curView=v;
  document.querySelectorAll('.nav button').forEach(b=>{b.className=b.dataset.v===v?'on':''});
  Object.entries(views).forEach(([k,el])=>{el.classList.toggle('hidden',k!==v);});
  pickEmpty.classList.add('hidden');
  if(v==='pick'){if(!pair)pickEmpty.classList.remove('hidden');else{viewPick.classList.remove('hidden');renderPair();}}
  if(v==='ranks')renderRanks();
  if(v==='favs')renderFavsList();
}
window.switchView=switchView;

function setFilter(f){
  S.filter=f;save();
  document.querySelectorAll('.gender-bar button').forEach(b=>{b.className=b.dataset.g===f?'on':''});
  pair=pickPair(pool(),S.favs);renderPair();updateStats();
  if(curView==='ranks')renderRanks();
  if(curView==='favs')renderFavsList();
}

// ── Events ──
document.querySelectorAll('.nav button').forEach(b=>{b.addEventListener('click',()=>switchView(b.dataset.v));});
document.querySelectorAll('.gender-bar button').forEach(b=>{b.addEventListener('click',()=>setFilter(b.dataset.g));});
cardL.addEventListener('click',()=>doPick('left'));
cardR.addEventListener('click',()=>doPick('right'));
heartL.addEventListener('click',e=>{e.stopPropagation();if(pair)toggleFav(pair[0]);renderPair();});
heartR.addEventListener('click',e=>{e.stopPropagation();if(pair)toggleFav(pair[1]);renderPair();});
elimL.addEventListener('click',e=>{e.stopPropagation();elimOne('left');});
elimR.addEventListener('click',e=>{e.stopPropagation();elimOne('right');});
neitherBtn.addEventListener('click',doNeither);
$('resetBtn').addEventListener('click',()=>{if(confirm('Reset everything?')){S={ratings:{},comps:[],elim:{},favs:{},spellings:{},filter:S.filter};localStorage.removeItem(SKEY);rankShowN=25;save();pair=pickPair(pool(),S.favs);renderPair();updateStats();switchView('pick');}});

// Expose for inline handlers
window.toggleFav=toggleFav;window.eliminate=eliminate;window.renderRanks=renderRanks;
Object.defineProperty(window,'rankShowN',{get:()=>rankShowN,set:v=>{rankShowN=v;}});

// ── Init ──
load();
document.querySelectorAll('.gender-bar button').forEach(b=>{b.className=b.dataset.g===S.filter?'on':''});
pair=pickPair(pool(),S.favs);renderPair();updateStats();
</script>

</body>
</html>
